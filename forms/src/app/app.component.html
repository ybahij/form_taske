<div class="shell" [class.collapsed]="sidenavCollapsed">

  <!-- ── Side Navigation ─────────────────────────────────────────────────── -->
  <aside class="sidenav">

    <div class="sidenav-header">
      <div class="logo-area">
        <mat-icon class="logo-icon">directions_car</mat-icon>
        <span class="logo-text">Vehicle Manager</span>
      </div>
      <button class="collapse-btn" (click)="toggleSidenav()">
        <mat-icon>{{ sidenavCollapsed ? 'menu' : 'menu_open' }}</mat-icon>
      </button>
    </div>

    <nav class="sidenav-nav">
      <a routerLink="/vehicles" routerLinkActive="nav-active" class="nav-link" [title]="sidenavCollapsed ? 'Véhicules' : ''">
        <mat-icon>directions_car</mat-icon>
        <span class="nav-label">Véhicules</span>
      </a>
      <a routerLink="/partage" routerLinkActive="nav-active" class="nav-link" [title]="sidenavCollapsed ? 'Partage' : ''">
        <mat-icon>share</mat-icon>
        <span class="nav-label">Partage</span>
      </a>
      <a routerLink="/reports" routerLinkActive="nav-active" class="nav-link" [title]="sidenavCollapsed ? 'Rapports' : ''">
        <mat-icon>assessment</mat-icon>
        <span class="nav-label">Rapports</span>
      </a>
    </nav>

  </aside>

  <!-- ── Main Content ────────────────────────────────────────────────────── -->
  <main class="content-area-main">
    <router-outlet></router-outlet>
  </main>

</div>

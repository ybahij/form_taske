<div class="dialog-header-complex">
  <div class="header-image-placeholder">
    <ng-container *ngIf="customIcon?.startsWith('assets/'); else mdOrImgUrl">
      <img [src]="customIcon" alt="Vehicle Icon">
    </ng-container>
    <ng-template #mdOrImgUrl>
      <img [src]="form.get('imageUrl')?.value" alt="Vehicle Image" *ngIf="form.get('imageUrl')?.value; else matIconHeader">
      <ng-template #matIconHeader>
        <mat-icon>{{ customIcon || 'directions_car' }}</mat-icon>
      </ng-template>
    </ng-template>
  </div>
  <div class="header-text-lines">
    <div class="line-description-row">
      <span class="status-dot" [class.active]="form.get('isActive')?.value"></span>
      <div class="line-description">{{ form.get('description')?.value || 'Nouvelle Description' }}</div>
      <button mat-icon-button class="status-toggle-btn" (click)="toggleStatus()" matTooltip="Basculer le statut">
        <mat-icon>{{ form.get('isActive')?.value ? 'toggle_on' : 'toggle_off' }}</mat-icon>
      </button>
    </div>
    <div class="line-id">ID Véhicule: {{ form.get('idVehicule')?.value || '-' }}</div>
    <div class="line-imei">IMEI: {{ form.get('imei')?.value || '-' }}</div>
  </div>
  <div class="header-actions">
    <button mat-icon-button (click)="onClose()" class="close-btn-top">
      <mat-icon>close</mat-icon>
    </button>
  </div>
</div>
